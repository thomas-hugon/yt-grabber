<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>YT Grabber</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101115;
      --panel: #161821;
      --text: #e7e9ef;
      --muted: #a8adbc;
      --gold: #f0a500;
      --ok: #46d47d;
      --warn: #f0a500;
      --err: #ef4d5f;
    }

    body {
      margin: 0;
      width: 260px;
      background: radial-gradient(circle at top right, #1a2030 0, #101115 45%);
      color: var(--text);
      font: 13px 'Segoe UI', system-ui, sans-serif;
      padding: 14px;
    }

    .head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, #f0a500, #ff7a18);
      display: grid;
      place-items: center;
      color: #111;
      box-shadow: 0 10px 24px rgba(240, 165, 0, 0.3);
    }

    .logo svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
    }

    .status {
      border: 1px solid #2b2e3a;
      border-radius: 10px;
      background: var(--panel);
      padding: 10px;
      line-height: 1.35;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(70, 212, 125, 0.5);
      animation: pulse 1.6s infinite;
      flex: 0 0 auto;
    }

    .dot.warn {
      background: var(--warn);
      box-shadow: none;
      animation: none;
    }

    .dot.err {
      background: var(--err);
      box-shadow: none;
      animation: none;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      display: none;
    }

    .hint.show {
      display: block;
    }

    .version,
    .token,
    .pairing {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      display: none;
      line-height: 1.4;
      word-break: break-word;
    }

    .version.show,
    .token.show,
    .pairing.show {
      display: block;
    }

    .pairing {
      font-size: 11px;
    }

    .pairing a {
      color: #8fb5ff;
      text-decoration: none;
    }

    .pairing a:hover {
      text-decoration: underline;
    }

    #copyTokenBtn {
      margin-left: 8px;
      border: 1px solid #3b4257;
      border-radius: 6px;
      background: #1b2030;
      color: var(--text);
      font: 600 11px 'Segoe UI', system-ui, sans-serif;
      padding: 3px 8px;
      cursor: pointer;
    }

    #copyTokenBtn:hover,
    #retryBtn:hover,
    #saveTokenBtn:hover {
      background: #22283a;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    #retryBtn,
    #saveTokenBtn {
      border: 1px solid #3b4257;
      border-radius: 8px;
      background: #1b2030;
      color: var(--text);
      font: 600 12px 'Segoe UI', system-ui, sans-serif;
      padding: 6px 10px;
      cursor: pointer;
    }

    .token-editor {
      margin-top: 10px;
      border-top: 1px solid #2b2e3a;
      padding-top: 10px;
    }

    .token-editor label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    #tokenInput {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #3b4257;
      border-radius: 8px;
      background: #111624;
      color: var(--text);
      font: 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
      padding: 7px 8px;
    }

    .token-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    #tokenEditorMsg {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      min-height: 14px;
    }

    #tokenEditorMsg.err {
      color: var(--err);
    }

    #tokenEditorMsg.ok {
      color: var(--ok);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(70, 212, 125, 0.5); }
      70% { box-shadow: 0 0 0 7px rgba(70, 212, 125, 0); }
      100% { box-shadow: 0 0 0 0 rgba(70, 212, 125, 0); }
    }
  </style>
</head>
<body>
  <div class="head">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M11 2h2v9h3l-4 5-4-5h3V2zm-6 17h14v2H5z"/></svg>
    </div>
    <div class="title" id="popupTitle">YT Grabber</div>
  </div>

  <div class="status">
    <div class="row"><span class="dot" id="dot"></span><span id="label"></span></div>
    <div class="hint" id="hint"></div>
    <div class="version" id="version"></div>
    <div class="token" id="tokenLine">
      <span id="tokenLineLabel"></span>
      <span id="tokenValue"></span>
      <button id="copyTokenBtn" type="button"></button>
    </div>
    <div class="pairing" id="pairingInfo">
      <div id="pairingInstaller"></div>
      <div id="pairingSurfaces"></div>
      <a id="releaseLink" href="https://github.com/thomas-hugon/yt-grabber/releases/latest" target="_blank" rel="noopener noreferrer"></a>
    </div>
    <div class="token-editor">
      <label for="tokenInput" id="tokenEditorLabel"></label>
      <input id="tokenInput" type="text" spellcheck="false" autocomplete="off" />
      <div class="token-actions">
        <button id="saveTokenBtn" type="button"></button>
      </div>
      <div id="tokenEditorMsg"></div>
    </div>
    <div class="actions">
      <button id="retryBtn" type="button"></button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
